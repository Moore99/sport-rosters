workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      groups:
        - Keys
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.sportsrostering.app
    cache:
      cache_paths:
        - ~/.pub-cache
        - ios/Pods
        - $HOME/Library/Caches/CocoaPods
    scripts:
      - name: Clean previous builds
        script: rm -rf build
      - name: Set up code signing settings on Xcode project
        script: xcode-project use-profiles
      - name: Get Flutter packages
        script: flutter pub get
      - name: Install CocoaPods
        script: find . -name "Podfile" -execdir pod install \;
      - name: Build IPA
        script: |
          flutter build ipa --release \
            --build-name=$(cat version.txt) \
            --build-number=$BUILD_NUMBER \
            --dart-define=GOOGLE_PLACES_API_KEY_IOS=$GOOGLE_PLACES_API_KEY_IOS \
            --dart-define=GOOGLE_PLACES_API_KEY_ANDROID=$GOOGLE_PLACES_API_KEY_ANDROID \
            --export-options-plist=/Users/builder/export_options.plist
      - name: Upload dSYMs to Crashlytics
        script: |
          find build/ios/archive/Runner.xcarchive/dSYMs -name "*.dSYM" | \
          xargs -I {} ios/Pods/FirebaseCrashlytics/upload-symbols \
            -gsp ios/Runner/GoogleService-Info.plist -p ios {}
    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/archive/Runner.xcarchive/dSYMs/*.dSYM
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: false
