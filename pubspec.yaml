name: sports_rostering
description: Multi-sport team roster, scheduling, and drop-in session management
publish_to: "none"
version: 1.2.0+34

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # UI & Icons
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  image_picker: ^1.1.2
  image_cropper: ^9.0.0
  flutter_local_notifications: ^18.0.0

  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Navigation
  go_router: ^17.1.0

  # Firebase — versions resolved by pub (compatible set)
  # firebase_messaging and firebase_crashlytics deferred to Phase 2 (core version conflict at earlier versions)
  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  cloud_firestore: ^6.2.0
  google_sign_in: ^6.2.0
  firebase_messaging: ^16.1.1
  firebase_crashlytics: ^5.0.7
  cloud_functions: ^6.1.0
  flutter_native_splash: ^2.3.8
  firebase_storage: ^13.2.0
  firebase_app_check: ^0.4.2
  firebase_analytics: ^12.2.0

  # Local Storage
  flutter_secure_storage: ^10.0.0
  shared_preferences: ^2.2.2

  # Ads (Google AdMob)
  google_mobile_ads: ^5.0.0

  # In-app purchases (Remove Ads)
  in_app_purchase: ^3.2.0

  # Sign in with Apple (required by App Store when any social login is offered)
  sign_in_with_apple: ^6.0.0

  # Biometric authentication (Face ID / Touch ID / Fingerprint)
  local_auth: ^2.3.0

  # Utilities
  url_launcher: ^6.3.0
  package_info_plus: ^9.0.0
  connectivity_plus: ^7.0.0
  share_plus: ^12.0.1
  pdf: ^3.11.0
  printing: ^5.13.0
  intl: ^0.20.0

  # In-app review prompt (rate the app)
  in_app_review: ^2.0.9

  # Form validation
  form_builder_validators: ^11.0.0

  # QR code generation and scanning
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.2.0

  # Google Places autocomplete
  google_places_flutter: ^2.0.8

  # Typography
  google_fonts: ^6.2.1

  # Notifications badge — deferred to Phase 3
  # app_badge_plus: ^1.2.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.8
  riverpod_generator: ^2.3.9
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/sport_icons/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"
  min_sdk_android: 23
  remove_alpha_ios: true
  # Adaptive icon for Android 8+ — blue background matches icon background
  adaptive_icon_background: "#2196F3"
  adaptive_icon_foreground: "assets/icons/app_icon.png"
  web:
    generate: false
  windows:
    generate: false

flutter_native_splash:
  # Light mode — white background, icon centred
  color: "#ffffff"
  image: assets/icons/app_icon.png
  # Dark mode — dark blue background
  color_dark: "#0d1b2a"
  image_dark: assets/icons/app_icon.png
  android_12:
    color: "#2196F3"
    image: assets/icons/app_icon.png
    color_dark: "#0d1b2a"
    image_dark: assets/icons/app_icon.png
  fullscreen: false
