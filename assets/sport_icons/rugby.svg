  <line x1="50" y1="18" x2="50" y2="82" stroke="#000" stroke-width="3"/>
  <!-- Lacing stitches -->
  <line x1="44" y1="34" x2="56" y2="34" stroke="#000" stroke-width="3"/>
  <line x1="43" y1="44" x2="57" y2="44" stroke="#000" stroke-width="3"/>
  <line x1="43" y1="54" x2="57" y2="54" stroke="#000" stroke-width="3"/>
  <line x1="44" y1="64" x2="56" y2="64" stroke="#000" stroke-width="3"/>
</svg>
