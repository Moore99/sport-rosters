<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- H-shaped goalpost (unique to Gaelic games) -->
  <line x1="28" y1="96" x2="28" y2="10" stroke="#000" stroke-width="8" stroke-linecap="round"/>
  <line x1="72" y1="96" x2="72" y2="10" stroke="#000" stroke-width="8" stroke-linecap="round"/>
  <line x1="28" y1="58" x2="72" y2="58" stroke="#000" stroke-width="8" stroke-linecap="round"/>
  <!-- Round ball between uprights above crossbar (a "point") -->
  <circle cx="50" cy="36" r="14" fill="none" stroke="#000" stroke-width="6"/>
</svg>
